name: app_it_pass
description: "ITパスポート試験対策過去問アプリ"

publish_to: 'none'
version: 1.0.0+13

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.3.0
  core:
    path: ../core
  envied: ^1.3.1
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  google_mobile_ads: ^8.0.0
  hooks_riverpod: ^3.1.0

dev_dependencies:
  build_runner: ^2.15.0
  envied_generator: ^1.3.3
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  pedantic_mono: ^1.32.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/image/

flutter_launcher_icons:
  android: true
  image_path_android: "assets/logo/logo_it_pass.png"
  adaptive_icon_foreground: "assets/logo/logo_it_pass.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/logo/logo_it_pass.png"
  ios: true
  image_path_ios: "assets/logo/logo_it_pass.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/logo/logo_it_pass.png"
  image_path_ios_tinted_grayscale: "assets/logo/logo_it_pass.png"
  desaturate_tinted_to_grayscale_ios: true
