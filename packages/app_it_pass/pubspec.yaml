name: app_it_pass
description: "ITパスポート試験対策クイズアプリ"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  audioplayers:
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  confetti: ^0.8.0
  core:
    path: ../core
  cupertino_icons:
  drift: ^2.22.1
  drift_flutter: ^0.2.3
  envied:
  firebase_core: ^4.7.0
  fl_chart: ^0.69.0
  flame:
  flame_forge2d:
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_card_swiper: ^7.0.1
  flutter_hooks:
  flutter_localizations:
    sdk: flutter
  flutter_riverpod:
  flutter_svg:
  flutter_tts: ^4.0.0
  freezed_annotation:
  gap:
  go_router:
  google_mobile_ads:
  hooks_riverpod:
  json_annotation:
  pedantic_mono:
  purchases_flutter: ^9.15.1
  riverpod_annotation:
  sensors_plus:
  shared_preferences:
  shimmer: ^3.0.0
  slang:
  slang_flutter:
  url_launcher:

dev_dependencies:
  build_runner:
  drift_dev: ^2.22.1
  envied_generator:
  flutter_gen_runner:
  flutter_launcher_icons:
  flutter_test:
    sdk: flutter
  freezed:
  json_serializable:
  melos: ^6.3.3
  riverpod_generator:

flutter:
  uses-material-design: true
  assets:
    - assets/quiz/

flutter_launcher_icons:
  android: true
  image_path_android: "../core/assets/logo/logo_light.png"
  adaptive_icon_foreground: "../core/assets/logo/logo_light.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "../core/assets/logo/logo_dark.png"
  ios: true
  image_path_ios: "../core/assets/logo/logo_light.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "../core/assets/logo/logo_dark.png"
  image_path_ios_tinted_grayscale: "../core/assets/logo/logo_light.png"
  desaturate_tinted_to_grayscale_ios: true