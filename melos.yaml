# Melos ワークスペース（段階的に packages/* を追加する想定）
# 手順: https://melos.invertase.dev/ を参照し、`dart pub global activate melos` または
# ルートの dev_dependencies の melos で `dart run melos bootstrap` を実行。
#
# packages 分割を自分で進める場合の目安:
# 1. packages/core（現 lib/common）、packages/app_block_puzzle、packages/app_it_pass を作成
# 2. 各 package に pubspec.yaml（name: を package 名に）、lib/ へコード移動
# 3. ルート pubspec は melos のみにするか、開発用エントリだけ残す（公式サンプルに準拠）
# 4. import を package:core/... 等へ一括置換（IDE のリファクタ or rg/sed）
# 5. ルート melos.yaml の packages: に `- packages/**` を追加し `melos bootstrap`
name: anki_games_workspace
packages:
  - .
  - packages/**

scripts:
  analyze:
    run: dart analyze .
    description: 全パッケージの静的解析（現状はルートのみ）

  codegen:core:
    run: dart run melos exec -c 1 --scope=core --depends-on=build_runner -- "sh -c 'dart run build_runner build --delete-conflicting-outputs && dart run slang'"
    description: packages/core のコード生成（build_runner + dart run slang）

  test:
    run: flutter test
    description: テスト実行
