name: mono_games
description: "Block. - 音と触覚のASMRブロックパズル"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  audioplayers:
  auto_size_text: ^3.0.0
  cupertino_icons:
  drift: ^2.22.1
  drift_flutter: ^0.2.3
  envied:
  flame:
  flame_forge2d:
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_card_swiper: ^7.0.1
  flutter_hooks:
  flutter_localizations:
    sdk: flutter
  flutter_riverpod:
  flutter_svg:
  flutter_tts: ^4.0.0
  freezed_annotation:
  gap:
  google_mobile_ads:
  hooks_riverpod:
  json_annotation:
  pedantic_mono:
  purchases_flutter: ^9.15.1
  riverpod_annotation:
  sensors_plus:
  shared_preferences:
  slang:
  slang_flutter:
  url_launcher:

dev_dependencies:
  build_runner:
  drift_dev: ^2.22.1
  envied_generator:
  flutter_gen_runner:
  flutter_launcher_icons:
  flutter_test:
    sdk: flutter
  freezed:
  json_serializable:
  riverpod_generator:
  slang_build_runner:

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/fonts/
    - assets/sounds/block_puzzle/
    - assets/quiz/
  shaders:
    - shaders/block_puzzle/glassmorphism.frag
    - shaders/block_puzzle/wireframe.frag
    - shaders/block_puzzle/matte.frag
    - shaders/block_puzzle/bubble.frag
    - shaders/block_puzzle/ice.frag
    - shaders/block_puzzle/slate.frag
    - shaders/block_puzzle/slime.frag


  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf

flutter_launcher_icons:
  android: true
  image_path_android: "assets/logo/logo_light.png"
  adaptive_icon_foreground: "assets/logo/logo_light.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/logo/logo_dark.png"
  ios: true
  image_path_ios: "assets/logo/logo_light.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/logo/logo_dark.png"
  image_path_ios_tinted_grayscale: "assets/logo/logo_light.png"
  desaturate_tinted_to_grayscale_ios: true

flutter_gen:
  output: lib/gen/