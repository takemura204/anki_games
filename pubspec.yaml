name: mono_games
description: "Block. - 音と触覚のASMRブロックパズル"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # Firebase
  google_mobile_ads: 

  # 状態管理
  flutter_riverpod: 
  riverpod_annotation: 
  hooks_riverpod: 
  flutter_hooks:
  freezed_annotation: 
  json_annotation: 
  slang: 
  slang_flutter: 

  #コード品質管理
  pedantic_mono:

  #UI
  cupertino_icons:
  flex_color_scheme: ^8.4.0
  shared_preferences:
  flame: 
  flame_forge2d: 
  sensors_plus: 
  audioplayers: 
  url_launcher:
  flutter_svg:
  gap:
  envied:

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 自動生成
  build_runner:
  riverpod_generator:
  flutter_gen_runner:
  freezed:
  json_serializable:
  envied_generator:
  slang_build_runner:

  # アイコン生成
  flutter_launcher_icons:

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/fonts/
    - assets/sounds/block_puzzle/
  shaders:
    - shaders/block_puzzle/glassmorphism.frag
    - shaders/block_puzzle/wireframe.frag
    - shaders/block_puzzle/matte.frag
    - shaders/block_puzzle/bubble.frag
    - shaders/block_puzzle/ice.frag
    - shaders/block_puzzle/slate.frag
    - shaders/block_puzzle/slime.frag


  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf

flutter_launcher_icons:
  android: true
  image_path_android: "assets/logo/logo_light.png"
  adaptive_icon_foreground: "assets/logo/logo_light.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/logo/logo_dark.png"
  ios: true
  image_path_ios: "assets/logo/logo_light.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/logo/logo_dark.png"
  image_path_ios_tinted_grayscale: "assets/logo/logo_light.png"
  desaturate_tinted_to_grayscale_ios: true

flutter_gen:
  output: lib/gen/